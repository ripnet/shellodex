version: 2
project_name: shellodex

before:
  hooks:
    - go mod tidy

builds:
  - id: shellodex
    main: ./cmd/shellodex
    binary: shellodex
    ldflags:
      - -X github.com/ripnet/shellodex/internal/version.Version={{.Version}}
      - -X github.com/ripnet/shellodex/internal/version.Commit={{.ShortCommit}}
      - -X github.com/ripnet/shellodex/internal/version.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: ripnet
    name: shellodex
  draft: false
  prerelease: auto
